name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Flat Structure
        run: |
          # Создаем общую папку
          mkdir -p /home/runner/work/common
          cd /home/runner/work/common
          
          # Клонируем библиотеки
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          # Клонируем само приложение прямо в корень common (без подпапки)
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git .

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          # Теперь заходим в папку приложения, которая в корне common
          cd /home/runner/work/common/telon-gateway-app
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd /home/runner/work/common/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: /home/runner/work/common/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
