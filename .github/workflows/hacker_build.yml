name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Clone with No Nesting
        run: |
          # Создаем чистую папку common
          mkdir -p ${{ github.workspace }}/common
          cd ${{ github.workspace }}/common
          
          # Клонируем библиотеки
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          # Клонируем САМО ПРИЛОЖЕНИЕ прямо в текущую папку (через точку)
          # Это предотвратит создание лишней папки telon-gsm-sip-gateway
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git .

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Теперь путь будет идеально плоским, как и хочет проект
          cd ${{ github.workspace }}/common/telon-gateway-app
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd ${{ github.workspace }}/common/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: ${{ github.workspace }}/common/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
