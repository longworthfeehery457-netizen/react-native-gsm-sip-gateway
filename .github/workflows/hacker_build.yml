name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Workspace
        run: |
          # Создаем чистую папку для работы
          mkdir -p workdir
          cd workdir
          # Клонируем всё в одну папку рядом
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          # Заходим в папку приложения через нашу новую структуру
          cd workdir/telon-gsm-sip-gateway/telon-gateway-app
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd workdir/telon-gsm-sip-gateway/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: workdir/telon-gsm-sip-gateway/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
