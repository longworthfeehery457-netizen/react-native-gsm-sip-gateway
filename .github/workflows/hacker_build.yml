name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: telon-gsm-sip-gateway

      - name: Clone Libraries to Root
        run: |
          # Клонируем библиотеки прямо в домашнюю директорию раннера
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          # Заходим в папку приложения
          cd telon-gsm-sip-gateway/telon-gateway-app
          # Удаляем замок
          rm -f package-lock.json
          # Пробуем установить
          yarn install

      - name: Build Android Release APK
        run: |
          cd telon-gsm-sip-gateway/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: telon-gsm-sip-gateway/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
