name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone All Repositories
        run: |
          # Клонируем библиотеки во временную папку, чтобы потом разложить правильно
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          # Клонируем само приложение
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git main_app

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          # Заходим в папку приложения
          cd main_app/telon-gateway-app
          # Удаляем замок и запускаем установку
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd main_app/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: main_app/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
