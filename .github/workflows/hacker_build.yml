name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Clone and Link
        run: |
          # 1. Создаем чистую папку на уровень выше текущей
          cd ..
          mkdir -p common
          cd common
          
          # 2. Клонируем всё сюда (теперь они будут соседями)
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git
          
          # 3. Сохраняем путь для следующих шагов
          echo "PROJECT_PATH=$(pwd)/telon-gsm-sip-gateway/telon-gateway-app" >> $GITHUB_ENV

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_PATH }}
          yarn install

      - name: Build Android Release APK
        run: |
          cd ${{ env.PROJECT_PATH }}/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: ${{ env.PROJECT_PATH }}/android/app/build/outputs/apk/release/*.apk
