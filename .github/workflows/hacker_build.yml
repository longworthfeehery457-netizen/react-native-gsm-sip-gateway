name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and Prepare
        run: |
          # 1. Подменяем SSH на HTTPS
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/

          # 2. Клонируем приложение прямо в текущую папку
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git .
          
          # 3. Клонируем библиотеки на уровень выше, как они и прописаны в проекте
          cd ..
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Мы уже в нужной папке (благодаря клонированию через ".")
          cd telon-gateway-app
          yarn install

      - name: Build Android Release APK
        run: |
          cd telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: telon-gateway-app/android/app/build/outputs/apk/release/*.apk
