name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Structure
        run: |
          # Создаем папку в корне, чтобы не зависеть от имен Гитхаба
          sudo mkdir -p /common-folder
          sudo chmod 777 /common-folder
          cd /common-folder
          
          # Клонируем всё строго в одну кучу
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd /common-folder/telon-gsm-sip-gateway/telon-gateway-app
          # Удаляем файл-замок и ставим зависимости
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd /common-folder/telon-gsm-sip-gateway/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: /common-folder/telon-gsm-sip-gateway/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
