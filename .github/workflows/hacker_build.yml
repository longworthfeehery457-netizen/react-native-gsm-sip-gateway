name: Build Telon Gateway
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Structure Fix
        run: |
          # 1. Создаем чистую папку common
          mkdir -p ${{ github.workspace }}/common
          cd ${{ github.workspace }}/common
          
          # 2. Клонируем приложение в папку "app"
          git clone https://github.com/telon-org/telon-gsm-sip-gateway.git app
          
          # 3. Переносим всё из "app" на уровень выше (в common)
          mv app/* .
          mv app/.* . 2>/dev/null || true
          rm -rf app
          
          # 4. Теперь клонируем библиотеки рядом (теперь они будут соседями)
          git clone https://github.com/telon-org/react-native-tele.git
          git clone https://github.com/telon-org/react-native-sip2.git
          git clone https://github.com/telon-org/react-native-replace-dialer.git

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Теперь структура плоская, как и требовалось
          cd ${{ github.workspace }}/common/telon-gateway-app
          rm -f package-lock.json
          yarn install

      - name: Build Android Release APK
        run: |
          cd ${{ github.workspace }}/common/telon-gateway-app/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Telon-Final-APK
          path: ${{ github.workspace }}/common/telon-gateway-app/android/app/build/outputs/apk/release/*.apk
